name: Update Homework via API

on:
  repository_dispatch:
    types: [update_homework]
  workflow_dispatch:
    inputs:
      text:
        description: '作业文字'
        required: true
        type: string

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Parse and update homework
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          SKIP_GIT_CLONE: '1'
        run: |
          TEXT="${{ github.event.client_payload.text || github.event.inputs.text }}"
          python3 scripts/update_homework.py "$TEXT"

      - name: Commit and push
        run: |
          git config user.name "Hermes Bot"
          git config user.email "hermes@local"
          git add data.json
          if git diff --cached --quiet; then
            echo "No changes, skipping push"
          else
            git commit -m "Update homework data"
            git push origin main
          fi
